<form [formGroup]="form" (ngSubmit)="onSubmit()" class="abastecimento-form">
  <div class="form-grid">
    <div class="form-field full-width">
      <label for="veiculoId">Veículo</label>
      <select id="veiculoId" formControlName="veiculoId">
        <option value="" disabled>Selecione um veículo</option>
        <option *ngFor="let v of veiculos" [value]="v.id">{{ v.marca }} {{ v.modelo }} ({{ v.placa }})</option>
      </select>
      <div class="error" *ngIf="form.get('veiculoId')?.invalid && form.get('veiculoId')?.touched">
        Selecione um veículo.
      </div>
    </div>

    <div class="form-field">
      <label for="data">Data do Abastecimento</label>
      <input id="data" type="date" formControlName="data">
      <div class="error" *ngIf="form.get('data')?.invalid && form.get('data')?.touched">
        Data é obrigatória.
      </div>
    </div>

    <div class="form-field">
      <label for="tipoCombustivel">Combustível</label>
      <select id="tipoCombustivel" formControlName="tipoCombustivel">
        <option *ngFor="let tipo of tiposCombustivel" [value]="tipo">{{ tipo }}</option>
      </select>
      <div class="error" *ngIf="form.get('tipoCombustivel')?.invalid && form.get('tipoCombustivel')?.touched">
        Tipo de combustível é obrigatório.
      </div>
    </div>

    <div class="form-field">
      <label for="valorTotal">Valor Total (R$)</label>
      <input id="valorTotal" type="number" step="0.01" formControlName="valorTotal" placeholder="0.00">
      <div class="error" *ngIf="form.get('valorTotal')?.invalid && form.get('valorTotal')?.touched">
        Valor total inválido.
      </div>
    </div>

    <div class="form-field">
      <label for="litros">Litros</label>
      <input id="litros" type="number" step="0.01" formControlName="litros" placeholder="0.00">
      <div class="error" *ngIf="form.get('litros')?.invalid && form.get('litros')?.touched">
        Quantidade de litros inválida.
      </div>
    </div>

    <div class="form-field full-width">
      <label for="quilometragem">Quilometragem (KM no painel)</label>
      <input id="quilometragem" type="number" formControlName="quilometragem" placeholder="Ex: 50000">
      <div class="error" *ngIf="form.get('quilometragem')?.invalid && form.get('quilometragem')?.touched">
        Quilometragem inválida.
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn-cancel" (click)="onCancel()" [disabled]="isLoading()">Cancelar</button>
    <button type="submit" class="btn-save" [disabled]="form.invalid || isLoading()">
      {{ isLoading() ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>
</form>
