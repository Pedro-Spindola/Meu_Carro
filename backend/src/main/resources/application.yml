spring:
  application:
    name: drivenote

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:CHAVE_LOCAL_APENAS_PARA_DEV_MAIOR_QUE_256_BITS_123456}
    expiration: 3600000
    refresh-expiration: 604800000

server:
  port: 8081
  tomcat:
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b %{X-Correlation-Id}i'
      directory: logs
      prefix: access
      suffix: .log
      rotate: true

logging:
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origins: "http://localhost:4200"