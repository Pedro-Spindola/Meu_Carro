spring:
  datasource:
    url: jdbc:h2:mem:drivenote_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

security:
  jwt:
    secret: CHAVE_TESTE_MAIOR_QUE_256_BITS_1234567890_TESTE
    expiration: 7200000
    refresh-expiration: 1209600000

app:
  cors:
    allowed-origins: "http://localhost:4200"
  rate-limit:
    enabled: false
    capacity: 60
    period: 1m